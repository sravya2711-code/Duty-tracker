<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>హోటల్ డ్యూటీ ట్రాకర్</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  :root{
    --navy:#12213f;
    --navy-2:#1c3363;
    --gold:#e8b93f;
    --cream:#fbf6ea;
    --green:#1c6b3c;
    --orange:#c1481d;
    --purple:#4a2a7a;
    --night:#0e1730;
    --ink:#1d2433;
    --line:#e4d9bd;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Noto Sans Telugu','Gautami',sans-serif;
    background:var(--cream);
    color:var(--ink);
    min-height:100vh;
  }
  .topbar{
    background:var(--navy);
    color:#fff;
    padding:16px 14px 14px;
    text-align:center;
    position:relative;
    box-shadow:0 3px 0 var(--gold);
  }
  .topbar h1{
    margin:0;
    font-size:1.35rem;
    letter-spacing:.3px;
  }
  .topbar .sub{
    font-size:.8rem;
    opacity:.75;
    margin-top:4px;
  }
  .gear{
    position:absolute;
    top:14px; right:14px;
    background:none;
    border:none;
    font-size:1.3rem;
    cursor:pointer;
    color:#fff;
  }
  .backbtn{
    position:absolute;
    top:14px; left:14px;
    background:none;
    border:none;
    font-size:1.5rem;
    cursor:pointer;
    color:#fff;
  }
  .screen{
    display:none;
    padding:18px 14px 100px;
    max-width:620px;
    margin:0 auto;
  }
  .screen.active{display:block;}

  /* Worker select */
  .worker-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
    margin-top:18px;
  }
  .worker-card{
    background:#fff;
    border:2px solid var(--line);
    border-radius:16px;
    padding:22px 10px;
    text-align:center;
    cursor:pointer;
    transition:transform .1s;
  }
  .worker-card:active{transform:scale(.96); background:#fff7e2;}
  .worker-card .emoji{font-size:2.6rem; display:block; margin-bottom:8px;}
  .worker-card .name{font-size:1.15rem; font-weight:700; color:var(--navy);}

  /* Day select */
  .day-grid{
    display:flex;
    gap:14px;
    margin-top:22px;
  }
  .day-card{
    flex:1;
    background:#fff;
    border:2px solid var(--line);
    border-radius:16px;
    padding:34px 10px;
    text-align:center;
    font-size:1.4rem;
    font-weight:700;
    color:var(--navy);
    cursor:pointer;
  }
  .day-card:active{transform:scale(.96); background:#fff7e2;}
  .day-card .n{
    display:block;
    font-size:2.4rem;
    color:var(--gold);
    -webkit-text-stroke:1px var(--navy);
    margin-bottom:6px;
  }

  .hello{
    text-align:center;
    font-size:1.05rem;
    color:#555;
    margin-top:4px;
  }
  .hello b{color:var(--navy);}

  /* Checklist */
  .progress-wrap{
    background:#fff;
    border:2px solid var(--line);
    border-radius:14px;
    padding:12px 14px;
    margin-bottom:16px;
    display:flex;
    align-items:center;
    gap:12px;
  }
  .progress-bar{
    flex:1;
    height:12px;
    background:#eee2c2;
    border-radius:8px;
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    background:var(--green);
    width:0%;
    transition:width .25s;
  }
  .progress-text{font-weight:700; color:var(--navy); font-size:.95rem; white-space:nowrap;}

  .shift-block{margin-bottom:16px;}
  .shift-title{
    color:#fff;
    padding:8px 12px;
    border-radius:10px 10px 0 0;
    font-weight:700;
    font-size:.95rem;
  }
  .shift-title.morning{background:var(--green);}
  .shift-title.afternoon{background:var(--orange);}
  .shift-title.evening{background:var(--purple);}
  .shift-title.night{background:var(--night);}

  .task-list{
    background:#fff;
    border:2px solid var(--line);
    border-top:none;
    border-radius:0 0 10px 10px;
  }
  .task-row{
    display:flex;
    align-items:center;
    gap:12px;
    padding:14px 12px;
    border-bottom:1px solid var(--line);
    cursor:pointer;
  }
  .task-row:last-child{border-bottom:none;}
  .task-row.done{background:#f2f9f0;}
  .task-emoji{font-size:1.5rem; width:32px; text-align:center;}
  .task-text{flex:1;}
  .task-name{font-size:1.02rem; font-weight:600; color:var(--ink);}
  .task-time{font-size:.8rem; color:#777; margin-top:2px;}
  .check{
    width:30px; height:30px;
    border-radius:8px;
    border:2px solid #bbb;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:1.1rem;
    color:#fff;
    flex-shrink:0;
  }
  .task-row.done .check{background:var(--green); border-color:var(--green);}

  .footer-bar{
    position:fixed;
    bottom:0; left:0; right:0;
    background:#fff;
    border-top:2px solid var(--line);
    padding:12px 14px calc(12px + env(safe-area-inset-bottom));
    display:flex;
    gap:10px;
    max-width:620px;
    margin:0 auto;
  }
  .btn{
    flex:1;
    border:none;
    border-radius:12px;
    padding:16px 10px;
    font-size:1.05rem;
    font-weight:700;
    cursor:pointer;
  }
  .btn-primary{background:var(--green); color:#fff;}
  .btn-primary:active{background:#155230;}
  .btn-secondary{background:#eee; color:#444;}

  /* settings modal */
  .modal-bg{
    display:none;
    position:fixed; inset:0;
    background:rgba(0,0,0,.5);
    align-items:center;
    justify-content:center;
    z-index:50;
    padding:20px;
  }
  .modal-bg.active{display:flex;}
  .modal{
    background:#fff;
    border-radius:16px;
    padding:22px;
    width:100%;
    max-width:380px;
  }
  .modal h3{margin-top:0; color:var(--navy);}
  .modal input{
    width:100%;
    padding:12px;
    font-size:1rem;
    border:2px solid var(--line);
    border-radius:10px;
    margin:10px 0 16px;
  }
  .modal .row{display:flex; gap:10px;}

  /* pdf preview area, kept on-screen at 0,0 so html2canvas can capture it,
     but hidden behind everything else and invisible to the user */
  #pdf-export{
    position:fixed;
    left:0;
    top:0;
    width:700px;
    background:#fff;
    padding:24px;
    font-family:'Noto Sans Telugu',sans-serif;
    z-index:-1;
    opacity:0.01;
    pointer-events:none;
  }
  #pdf-export .ph{
    background:var(--navy);
    color:#fff;
    padding:16px;
    border-radius:10px;
    text-align:center;
    margin-bottom:16px;
  }
  #pdf-export .ph h2{margin:0; font-size:1.3rem;}
  #pdf-export .meta{font-size:.95rem; margin-bottom:14px; color:#333;}
  #pdf-export table{width:100%; border-collapse:collapse; font-size:.92rem;}
  #pdf-export th{background:#eee2c2; padding:8px; text-align:left; border:1px solid #ccc;}
  #pdf-export td{padding:8px; border:1px solid #ccc;}
  #pdf-export .yes{color:#1c6b3c; font-weight:700;}
  #pdf-export .no{color:#c1481d; font-weight:700;}

  .toast{
    position:fixed;
    bottom:90px; left:50%; transform:translateX(-50%);
    background:var(--navy); color:#fff;
    padding:12px 18px; border-radius:10px;
    font-size:.95rem;
    z-index:60;
    max-width:90%;
    text-align:center;
    display:none;
  }
</style>
</head>
<body>

<div class="topbar">
  <button class="backbtn" id="backBtn" style="display:none;" onclick="goBack()">←</button>
  <h1 id="topTitle">🧹 హోటల్ డ్యూటీ ట్రాకర్</h1>
  <div class="sub" id="topSub">మీ పేరు ఎంచుకోండి</div>
  <button class="gear" onclick="openSettings()">⚙️</button>
</div>

<!-- SCREEN 1: choose worker -->
<div class="screen active" id="screen-worker">
  <div class="worker-grid" id="workerGrid"></div>
</div>

<!-- SCREEN 2: choose day -->
<div class="screen" id="screen-day">
  <div class="hello">నమస్కారం, <b id="dayHello"></b> 🙏</div>
  <div class="hello">ఈరోజు ఏ రోజు షెడ్యూల్?</div>
  <div class="day-grid">
    <div class="day-card" onclick="chooseDay(1)"><span class="n">1</span>రోజు 1</div>
    <div class="day-card" onclick="chooseDay(2)"><span class="n">2</span>రోజు 2</div>
  </div>
</div>

<!-- SCREEN 3: checklist -->
<div class="screen" id="screen-tasks">
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-text" id="progressText">0/0</div>
  </div>
  <div id="taskContainer"></div>
</div>

<div class="footer-bar" id="footerBar" style="display:none;">
  <button class="btn btn-secondary" onclick="resetAll()">↺ మళ్ళీ మొదలు</button>
  <button class="btn btn-primary" onclick="sendReport()">✅ పూర్తి చేసి పంపండి</button>
</div>

<div class="toast" id="toast"></div>

<!-- settings modal -->
<div class="modal-bg" id="settingsModal">
  <div class="modal">
    <h3>⚙️ యజమాని WhatsApp నంబర్</h3>
    <div style="font-size:.85rem;color:#666;margin-bottom:4px;">దేశ కోడ్‌తో సహా (ఉదా: 91XXXXXXXXXX)</div>
    <input type="tel" id="ownerPhone" placeholder="91XXXXXXXXXX">
    <div class="row">
      <button class="btn btn-secondary" onclick="closeSettings()">రద్దు</button>
      <button class="btn btn-primary" onclick="saveSettings()">సేవ్ చేయండి</button>
    </div>
  </div>
</div>

<!-- hidden export template for PDF -->
<div id="pdf-export">
  <div class="ph"><h2>🧹 OneStop DriveIn — డ్యూటీ రిపోర్ట్</h2></div>
  <div class="meta">
    <div><b>పేరు:</b> <span id="pdfWorker"></span></div>
    <div><b>తేదీ:</b> <span id="pdfDate"></span></div>
    <div><b>షెడ్యూల్:</b> <span id="pdfDay"></span></div>
    <div><b>పూర్తయినవి:</b> <span id="pdfDone"></span></div>
  </div>
  <table>
    <thead><tr><th>సమయం</th><th>పని</th><th>స్థితి</th></tr></thead>
    <tbody id="pdfBody"></tbody>
  </table>
</div>

<script>
const WORKERS = ["కృష్ణవేడి","మనసా","వెంకటేష్","పాచయ్య"];
const WORKER_EMOJI = {"కృష్ణవేడి":"🧑‍🔧","మనసా":"👩‍🍳","వెంకటేష్":"🧑‍💼","పాచయ్య":"🧑‍🦱"};

const ICONS = [
  ["బాత్రూమ్","🚽"],["వంటగది పాత్రల","🍽️"],["డైనింగ్ టేబుల్స్","🪑"],
  ["వాహనాల పార్కింగ్","🚗"],["తలుపులు","🚪"],["గది శుభ్రపరచడం","🛏️"],
  ["వెయిటర్","🧑‍🍳"],["సూపర్‌వైజర్","👔"],["బ్రేక్","☕"],["విశ్రాంతి","😌"]
];
function iconFor(task){
  for(const [k,e] of ICONS){ if(task.includes(k)) return e; }
  return "🧹";
}

const SCHEDULE = {
  "కృష్ణవేడి": {
    1:[
      ["7:00 AM - 11:30 AM","బాత్రూమ్ శుభ్రపరచడం"],
      ["7:00 AM - 11:30 AM","వంటగది పాత్రల శుభ్రపరచడం"],
      ["12:30 PM - 5:00 PM","వంటగది పాత్రల శుభ్రపరచడం"],
      ["5:00 PM - 6:00 PM","విశ్రాంతి"],
      ["6:00 PM - 7:00 PM","గది శుభ్రపరచడం (రూమ్ క్లీనింగ్)"],
      ["7:00 PM - 9:00 PM","డైనింగ్ టేబుల్స్ & వంటగది పాత్రల శుభ్రపరచడం"]
    ],
    2:[
      ["7:00 AM - 11:30 AM","బాత్రూమ్ శుభ్రపరచడం"],
      ["7:00 AM - 11:30 AM","వంటగది పాత్రల శుభ్రపరచడం"],
      ["12:30 PM - 5:00 PM","డైనింగ్ టేబుల్స్ శుభ్రపరచడం"],
      ["5:00 PM - 6:00 PM","గది శుభ్రపరచడం (రూమ్ క్లీనింగ్)"],
      ["6:00 PM - 7:00 PM","విశ్రాంతి"],
      ["7:00 PM - 9:00 PM","డైనింగ్ టేబుల్స్ & వంటగది పాత్రల శుభ్రపరచడం"]
    ]
  },
  "మనసా": {
    1:[
      ["7:00 AM - 11:30 AM","బాత్రూమ్ శుభ్రపరచడం"],
      ["7:00 AM - 11:30 AM","వంటగది పాత్రల శుభ్రపరచడం"],
      ["12:30 PM - 5:00 PM","డైనింగ్ టేబుల్స్ శుభ్రపరచడం"],
      ["5:00 PM - 6:00 PM","గది శుభ్రపరచడం (రూమ్ క్లీనింగ్)"],
      ["6:00 PM - 7:00 PM","విశ్రాంతి"],
      ["7:00 PM - 9:00 PM","డైనింగ్ టేబుల్స్ & వంటగది పాత్రల శుభ్రపరచడం"]
    ],
    2:[
      ["7:00 AM - 11:30 AM","బాత్రూమ్ శుభ్రపరచడం"],
      ["7:00 AM - 11:30 AM","వంటగది పాత్రల శుభ్రపరచడం"],
      ["12:30 PM - 5:00 PM","వంటగది పాత్రల శుభ్రపరచడం"],
      ["5:00 PM - 6:00 PM","విశ్రాంతి"],
      ["6:00 PM - 7:00 PM","గది శుభ్రపరచడం (రూమ్ క్లీనింగ్)"],
      ["7:00 PM - 9:00 PM","డైనింగ్ టేబుల్స్ & వంటగది పాత్రల శుభ్రపరచడం"]
    ]
  },
  "వెంకటేష్": {
    1:[
      ["7:00 AM - 11:30 AM","హోటల్ తలుపులు శుభ్రపరచడం"],
      ["7:00 AM - 11:30 AM","డైనింగ్ టేబుల్స్ శుభ్రపరచడం"],
      ["7:00 AM - 11:30 AM","వాహనాల పార్కింగ్ శుభ్రపరచడం"],
      ["7:00 AM - 11:30 AM","గది శుభ్రపరచడం (రూమ్ క్లీనింగ్)"],
      ["12:30 PM - 5:00 PM","వెయిటర్ డ్యూటీ"],
      ["5:30 PM - 7:30 PM","బ్రేక్"],
      ["7:30 PM - 11:00 PM","వెయిటర్ డ్యూటీ & లాడ్జ్ సూపర్‌వైజర్"]
    ]
  },
  "పాచయ్య": {
    1:[
      ["9:00 AM - 11:30 AM","రూమ్ క్లీనింగ్"],
      ["12:30 PM - 5:00 PM","వెయిటర్ డ్యూటీ"],
      ["5:00 PM - 6:00 PM","బ్రేక్"],
      ["6:00 PM - 7:00 PM","వెయిటర్ డ్యూటీ"],
      ["7:00 PM - 11:00 PM","వెయిటర్ డ్యూటీ"]
    ]
  }
};
// venkatesh & pachayya don't rotate — mirror day1 into day2
SCHEDULE["వెంకటేష్"][2] = SCHEDULE["వెంకటేష్"][1];
SCHEDULE["పాచయ్య"][2] = SCHEDULE["పాచయ్య"][1];

function shiftOf(time){
  if(time.includes("7:00 AM")) return "morning";
  if(time.includes("12:30 PM")) return "afternoon";
  if(time.includes("5:") && !time.includes("PM - 9") ) return "evening";
  if(time.includes("7:") && time.includes("PM")) return "night";
  return "morning";
}
const SHIFT_LABEL = {morning:"🌞 ఉదయం",afternoon:"🌤 మధ్యాహ్నం",evening:"🌇 సాయంత్రం",night:"🌙 రాత్రి"};

let state = {worker:null, day:null, tasks:[]};

function renderWorkers(){
  const g = document.getElementById('workerGrid');
  g.innerHTML = "";
  WORKERS.forEach(w=>{
    const d = document.createElement('div');
    d.className = "worker-card";
    d.innerHTML = `<span class="emoji">${WORKER_EMOJI[w]}</span><span class="name">${w}</span>`;
    d.onclick = ()=>chooseWorker(w);
    g.appendChild(d);
  });
}
renderWorkers();

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function chooseWorker(w){
  state.worker = w;
  document.getElementById('dayHello').textContent = w;
  document.getElementById('topTitle').textContent = "🧹 "+w+" గారి డ్యూటీలు";
  document.getElementById('topSub').textContent = "రోజు ఎంచుకోండి";
  document.getElementById('backBtn').style.display='block';
  document.getElementById('footerBar').style.display='none';
  showScreen('screen-day');
}

function chooseDay(d){
  state.day = d;
  state.tasks = SCHEDULE[state.worker][d].map(([time,task])=>({time,task,done:false}));
  document.getElementById('topSub').textContent = "రోజు "+d+" — పనులు పూర్తి చేయండి";
  renderTasks();
  document.getElementById('footerBar').style.display='flex';
  showScreen('screen-tasks');
}

function goBack(){
  if(document.getElementById('screen-tasks').classList.contains('active')){
    document.getElementById('footerBar').style.display='none';
    document.getElementById('topSub').textContent="రోజు ఎంచుకోండి";
    showScreen('screen-day');
  } else if(document.getElementById('screen-day').classList.contains('active')){
    document.getElementById('backBtn').style.display='none';
    document.getElementById('topTitle').textContent="🧹 హోటల్ డ్యూటీ ట్రాకర్";
    document.getElementById('topSub').textContent="మీ పేరు ఎంచుకోండి";
    showScreen('screen-worker');
  }
}

function renderTasks(){
  const c = document.getElementById('taskContainer');
  c.innerHTML = "";
  const groups = {};
  state.tasks.forEach((t,i)=>{
    const s = shiftOf(t.time);
    groups[s] = groups[s]||[];
    groups[s].push(i);
  });
  ["morning","afternoon","evening","night"].forEach(s=>{
    if(!groups[s]) return;
    const block = document.createElement('div');
    block.className = "shift-block";
    block.innerHTML = `<div class="shift-title ${s}">${SHIFT_LABEL[s]}</div>`;
    const list = document.createElement('div');
    list.className = "task-list";
    groups[s].forEach(i=>{
      const t = state.tasks[i];
      const row = document.createElement('div');
      row.className = "task-row"+(t.done?" done":"");
      row.innerHTML = `
        <div class="task-emoji">${iconFor(t.task)}</div>
        <div class="task-text">
          <div class="task-name">${t.task}</div>
          <div class="task-time">${t.time}</div>
        </div>
        <div class="check">${t.done?"✓":""}</div>`;
      row.onclick = ()=>{ t.done = !t.done; renderTasks(); };
      list.appendChild(row);
    });
    block.appendChild(list);
    c.appendChild(block);
  });
  const done = state.tasks.filter(t=>t.done).length;
  const total = state.tasks.length;
  document.getElementById('progressFill').style.width = (total?done/total*100:0)+"%";
  document.getElementById('progressText').textContent = done+"/"+total;
}

function resetAll(){
  state.tasks.forEach(t=>t.done=false);
  renderTasks();
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(()=>t.style.display='none', 4000);
}

function openSettings(){
  document.getElementById('settingsModal').classList.add('active');
  window.storage?.get('owner-phone').then(r=>{
    if(r) document.getElementById('ownerPhone').value = r.value;
  }).catch(()=>{});
}
function closeSettings(){ document.getElementById('settingsModal').classList.remove('active'); }
async function saveSettings(){
  const v = document.getElementById('ownerPhone').value.trim();
  try{ await window.storage.set('owner-phone', v); }catch(e){}
  closeSettings();
  showToast("సేవ్ అయింది ✅");
}

async function getOwnerPhone(){
  try{
    const r = await window.storage.get('owner-phone');
    return r ? r.value : "";
  }catch(e){ return ""; }
}

async function sendReport(){
  const done = state.tasks.filter(t=>t.done).length;
  const total = state.tasks.length;
  const today = new Date().toLocaleDateString('en-GB');

  document.getElementById('pdfWorker').textContent = state.worker;
  document.getElementById('pdfDate').textContent = today;
  document.getElementById('pdfDay').textContent = "రోజు "+state.day;
  document.getElementById('pdfDone').textContent = done+" / "+total;
  const body = document.getElementById('pdfBody');
  body.innerHTML = "";
  state.tasks.forEach(t=>{
    body.innerHTML += `<tr><td>${t.time}</td><td>${t.task}</td><td class="${t.done?'yes':'no'}">${t.done?"✔ పూర్తయింది":"✘ పెండింగ్"}</td></tr>`;
  });

  showToast("PDF తయారు చేస్తోంది... ⏳");

  const el = document.getElementById('pdf-export');
  const opt = {
    margin:0.3,
    filename:`Duty_${state.worker}_Day${state.day}_${today.replace(/\//g,'-')}.pdf`,
    image:{type:'jpeg',quality:0.98},
    html2canvas:{scale:2},
    jsPDF:{unit:'in',format:'a4',orientation:'portrait'}
  };

  try{
    const pdfBlob = await html2pdf().set(opt).from(el).outputPdf('blob');
    const fileName = opt.filename;
    const file = new File([pdfBlob], fileName, {type:'application/pdf'});

    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({
        files:[file],
        title:'డ్యూటీ రిపోర్ట్',
        text:`${state.worker} - రోజు ${state.day} డ్యూటీ రిపోర్ట్ (${done}/${total} పూర్తి)`
      });
      showToast("షేర్ చేయబడింది ✅");
    } else {
      const url = URL.createObjectURL(pdfBlob);
      const a = document.createElement('a');
      a.href = url; a.download = fileName;
      document.body.appendChild(a); a.click(); a.remove();
      const phone = await getOwnerPhone();
      const msg = encodeURIComponent(`${state.worker} - రోజు ${state.day} డ్యూటీ రిపోర్ట్ (${done}/${total} పూర్తి). దయచేసి డౌన్‌లోడ్ అయిన PDFని అటాచ్ చేయండి.`);
      const wa = phone ? `https://wa.me/${phone}?text=${msg}` : `https://wa.me/?text=${msg}`;
      showToast("PDF డౌన్‌లోడ్ అయింది. WhatsApp తెరుస్తోంది — PDFని అటాచ్ చేయండి 📎");
      setTimeout(()=>window.open(wa,'_blank'), 1200);
    }
  }catch(err){
    showToast("లోపం: మళ్ళీ ప్రయత్నించండి");
    console.error(err);
  }
}
</script>
</body>
</html>

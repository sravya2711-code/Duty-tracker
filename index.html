<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>హోటల్ డ్యూటీ ట్రాకర్</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  :root{
    --navy:#12213f;
    --navy-2:#1c3363;
    --gold:#e8b93f;
    --cream:#fbf6ea;
    --green:#1c6b3c;
    --orange:#c1481d;
    --purple:#4a2a7a;
    --night:#0e1730;
    --ink:#1d2433;
    --line:#e4d9bd;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Noto Sans Telugu','Gautami',sans-serif;
    background:var(--cream);
    color:var(--ink);
    min-height:100vh;
  }
  .topbar{
    background:var(--navy);
    color:#fff;
    padding:16px 14px 14px;
    text-align:center;
    position:relative;
    box-shadow:0 3px 0 var(--gold);
  }
  .topbar h1{
    margin:0;
    font-size:1.35rem;
    letter-spacing:.3px;
  }
  .topbar .sub{
    font-size:.8rem;
    opacity:.75;
    margin-top:4px;
  }
  .gear{
    position:absolute;
    top:14px; right:14px;
    background:none;
    border:none;
    font-size:1.3rem;
    cursor:pointer;
    color:#fff;
  }
  .gear.eye{ right:54px; font-size:1.15rem; }
  .backbtn{
    position:absolute;
    top:14px; left:14px;
    background:none;
    border:none;
    font-size:1.5rem;
    cursor:pointer;
    color:#fff;
  }
  .screen{
    display:none;
    padding:18px 14px 100px;
    max-width:620px;
    margin:0 auto;
  }
  .screen.active{display:block;}

  /* Worker select */
  .worker-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
    margin-top:18px;
  }
  .worker-card{
    background:#fff;
    border:2px solid var(--line);
    border-radius:16px;
    padding:22px 10px;
    text-align:center;
    cursor:pointer;
    transition:transform .1s;
  }
  .worker-card:active{transform:scale(.96); background:#fff7e2;}
  .worker-card .emoji{font-size:2.6rem; display:block; margin-bottom:8px;}
  .worker-card .name{font-size:1.15rem; font-weight:700; color:var(--navy);}

  /* Day select */
  .day-grid{
    display:flex;
    gap:14px;
    margin-top:22px;
  }
  .day-card{
    flex:1;
    background:#fff;
    border:2px solid var(--line);
    border-radius:16px;
    padding:34px 10px;
    text-align:center;
    font-size:1.4rem;
    font-weight:700;
    color:var(--navy);
    cursor:pointer;
  }
  .day-card:active{transform:scale(.96); background:#fff7e2;}
  .day-card .n{
    display:block;
    font-size:2.4rem;
    color:var(--gold);
    -webkit-text-stroke:1px var(--navy);
    margin-bottom:6px;
  }

  .hello{
    text-align:center;
    font-size:1.05rem;
    color:#555;
    margin-top:4px;
  }
  .hello b{color:var(--navy);}

  /* Checklist */
  .progress-wrap{
    background:#fff;
    border:2px solid var(--line);
    border-radius:14px;
    padding:12px 14px;
    margin-bottom:16px;
    display:flex;
    align-items:center;
    gap:12px;
  }
  .progress-bar{
    flex:1;
    height:12px;
    background:#eee2c2;
    border-radius:8px;
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    background:var(--green);
    width:0%;
    transition:width .25s;
  }
  .progress-text{font-weight:700; color:var(--navy); font-size:.95rem; white-space:nowrap;}

  .shift-block{margin-bottom:16px;}
  .shift-title{
    color:#fff;
    padding:8px 12px;
    border-radius:10px 10px 0 0;
    font-weight:700;
    font-size:.95rem;
  }
  .shift-title.morning{background:var(--green);}
  .shift-title.afternoon{background:var(--orange);}
  .shift-title.evening{background:var(--purple);}
  .shift-title.night{background:var(--night);}

  .task-list{
    background:#fff;
    border:2px solid var(--line);
    border-top:none;
    border-radius:0 0 10px 10px;
  }
  .task-row{
    display:flex;
    align-items:center;
    gap:12px;
    padding:14px 12px;
    border-bottom:1px solid var(--line);
    cursor:pointer;
  }
  .task-row:last-child{border-bottom:none;}
  .task-row.done{background:#f2f9f0;}
  .task-emoji{font-size:1.5rem; width:32px; text-align:center;}
  .task-text{flex:1;}
  .task-name{font-size:1.02rem; font-weight:600; color:var(--ink);}
  .task-time{font-size:.8rem; color:#777; margin-top:2px;}
  .check{
    width:30px; height:30px;
    border-radius:8px;
    border:2px solid #bbb;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:1.1rem;
    color:#fff;
    flex-shrink:0;
  }
  .task-row.done .check{background:var(--green); border-color:var(--green);}

  .footer-bar{
    position:fixed;
    bottom:0; left:0; right:0;
    background:#fff;
    border-top:2px solid var(--line);
    padding:12px 14px calc(12px + env(safe-area-inset-bottom));
    display:flex;
    gap:10px;
    max-width:620px;
    margin:0 auto;
  }
  .btn{
    flex:1;
    border:none;
    border-radius:12px;
    padding:16px 10px;
    font-size:1.05rem;
    font-weight:700;
    cursor:pointer;
  }
  .btn-primary{background:var(--green); color:#fff;}
  .btn-primary:active{background:#155230;}
  .btn-secondary{background:#eee; color:#444;}

  /* settings modal */
  .modal-bg{
    display:none;
    position:fixed; inset:0;
    background:rgba(0,0,0,.5);
    align-items:center;
    justify-content:center;
    z-index:50;
    padding:20px;
  }
  .modal-bg.active{display:flex;}
  .modal{
    background:#fff;
    border-radius:16px;
    padding:22px;
    width:100%;
    max-width:380px;
  }
  .modal h3{margin-top:0; color:var(--navy);}
  .modal input{
    width:100%;
    padding:12px;
    font-size:1rem;
    border:2px solid var(--line);
    border-radius:10px;
    margin:10px 0 16px;
  }
  .modal .row{display:flex; gap:10px;}

  .toast{
    position:fixed;
    bottom:90px; left:50%; transform:translateX(-50%);
    background:var(--navy); color:#fff;
    padding:12px 18px; border-radius:10px;
    font-size:.95rem;
    z-index:60;
    max-width:90%;
    text-align:center;
    display:none;
  }
</style>
</head>
<body>

<div class="topbar">
  <button class="backbtn" id="backBtn" style="display:none;" onclick="goBack()">←</button>
  <h1 id="topTitle">🧹 హోటల్ డ్యూటీ ట్రాకర్</h1>
  <div class="sub" id="topSub">మీ పేరు ఎంచుకోండి</div>
  <div class="sub" id="dutySyncStatus" style="font-size:.7rem;opacity:.65;margin-top:3px;"></div>
  <button class="gear eye" id="eyeBtn" onclick="openOwnerView()" title="Owner view">👁️</button>
  <button class="gear" onclick="openSettings()">⚙️</button>
</div>

<!-- SCREEN 1: choose worker -->
<div class="screen active" id="screen-worker">
  <div class="worker-grid" id="workerGrid"></div>
</div>

<!-- SCREEN 2: choose day -->
<div class="screen" id="screen-day">
  <div class="hello">నమస్కారం, <b id="dayHello"></b> 🙏</div>
  <div class="hello">ఈరోజు ఏ రోజు షెడ్యూల్?</div>
  <div class="day-grid">
    <div class="day-card" onclick="chooseDay(1)"><span class="n">1</span>రోజు 1</div>
    <div class="day-card" onclick="chooseDay(2)"><span class="n">2</span>రోజు 2</div>
  </div>
</div>

<!-- SCREEN 3: checklist -->
<div class="screen" id="screen-tasks">
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-text" id="progressText">0/0</div>
  </div>
  <div id="taskContainer"></div>
</div>

<!-- SCREEN 4: owner view -->
<div class="screen" id="screen-owner">
  <div id="ownerSyncStatus" style="font-size:.78rem;color:#888;margin-bottom:12px;">Connecting…</div>
  <div id="ownerList"></div>
</div>

<div class="footer-bar" id="footerBar" style="display:none;">
  <button class="btn btn-secondary" onclick="resetAll()">↺ మళ్ళీ మొదలు</button>
  <button class="btn btn-primary" onclick="sendReport()">✅ పూర్తి చేసి పంపండి</button>
</div>

<div class="toast" id="toast"></div>

<!-- settings modal -->
<div class="modal-bg" id="settingsModal">
  <div class="modal">
    <h3>⚙️ యజమాని WhatsApp నంబర్</h3>
    <div style="font-size:.85rem;color:#666;margin-bottom:4px;">దేశ కోడ్‌తో సహా (ఉదా: 91XXXXXXXXXX)</div>
    <input type="tel" id="ownerPhone" placeholder="91XXXXXXXXXX">
    <div class="row">
      <button class="btn btn-secondary" onclick="closeSettings()">రద్దు</button>
      <button class="btn btn-primary" onclick="saveSettings()">సేవ్ చేయండి</button>
    </div>
  </div>
</div>

// venkatesh & pachayya don't rotate — mirror day1 into day2

SCHEDULE["పాచయ్య"][2] = SCHEDULE["పాచయ్య"][1];

function shiftOf(time){
  if(time.includes("7:00 AM")) return "morning";
  if(time.includes("12:30 PM")) return "afternoon";
  if(time.includes("5:") && !time.includes("PM - 9") ) return "evening";
  if(time.includes("7:") && time.includes("PM")) return "night";
  return "morning";
}
const SHIFT_LABEL = {morning:"🌞 ఉదయం",afternoon:"🌤 మధ్యాహ్నం",evening:"🌇 సాయంత్రం",night:"🌙 రాత్రి"};

let state = {worker:null, day:null, tasks:[]};

// ---- Firebase (same project as the attendance/salary tracker, separate data path) ----
const FIREBASE_URL = 'https://attendance-and-salary-tr-20681-default-rtdb.asia-southeast1.firebasedatabase.app';
const DUTY_PATH = 'onestop-duty-data';

function withTimeout(promise, ms){
  return Promise.race([
    promise,
    new Promise((_,reject)=> setTimeout(()=>reject(new Error('timeout')), ms))
  ]);
}
async function firebaseGet(path){
  const res = await withTimeout(fetch(FIREBASE_URL+'/'+path+'.json'), 5000);
  if(!res.ok) throw new Error('firebase get failed: '+res.status);
  return await res.json();
}
async function firebaseSet(path, data){
  const res = await withTimeout(fetch(FIREBASE_URL+'/'+path+'.json', {
    method:'PUT',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(data)
  }), 5000);
  if(!res.ok) throw new Error('firebase set failed: '+res.status);
  return true;
}
function todayStr(){
  const d = new Date();
  const pad = n=> n<10?'0'+n:''+n;
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}
function dutyDatePath(dateStr){ return DUTY_PATH+'/'+dateStr; }
function dutyWorkerPath(dateStr, worker){ return dutyDatePath(dateStr)+'/'+encodeURIComponent(worker); }

// local cache so a worker's own progress survives if the internet drops mid-shift
async function localGet(key){
  try{
    if(typeof window.storage !== 'undefined' && window.storage){
      const r = await withTimeout(window.storage.get(key, false), 4000);
      if(r) return JSON.parse(r.value);
    }
  }catch(e){}
  try{ const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; }catch(e){ return null; }
}
async function localSet(key, obj){
  const str = JSON.stringify(obj);
  try{
    if(typeof window.storage !== 'undefined' && window.storage){
      await withTimeout(window.storage.set(key, str, false), 4000);
    }
  }catch(e){}
  try{ localStorage.setItem(key, str); }catch(e){}
}

function setDutySyncStatus(ok){
  const el = document.getElementById('dutySyncStatus');
  if(el) el.textContent = ok ? '\u25cf సింక్ అయింది (Synced)' : '\u25cf ఆఫ్‌లైన్ \u2013 ఈ ఫోన్‌లో సేవ్ అయింది';
  const el2 = document.getElementById('ownerSyncStatus');
  if(el2) el2.textContent = ok ? '\u25cf ప్రతి 5 సెకన్లకు నవీకరిస్తుంది (live)' : '\u25cf ఆఫ్‌లైన్ \u2013 మళ్ళీ ప్రయత్నిస్తోంది\u2026';
}

async function saveDutyProgress(){
  const dateStr = todayStr();
  const payload = {day: state.day, tasks: state.tasks, updatedAt: Date.now()};
  const key = 'duty-'+state.worker+'-'+dateStr;
  localSet(key, payload);
  try{
    await firebaseSet(dutyWorkerPath(dateStr, state.worker), payload);
    setDutySyncStatus(true);
  }catch(e){
    setDutySyncStatus(false);
  }
}

function renderWorkers(){
  const g = document.getElementById('workerGrid');
  g.innerHTML = "";
  WORKERS.forEach(w=>{
    const d = document.createElement('div');
    d.className = "worker-card";
    d.innerHTML = `<span class="emoji">${WORKER_EMOJI[w]}</span><span class="name">${w}</span>`;
    d.onclick = ()=>chooseWorker(w);
    g.appendChild(d);
  });
}
renderWorkers();

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function chooseWorker(w){
  state.worker = w;
  document.getElementById('dayHello').textContent = w;
  document.getElementById('topTitle').textContent = "🧹 "+w+" గారి డ్యూటీలు";
  document.getElementById('topSub').textContent = "రోజు ఎంచుకోండి";
  document.getElementById('backBtn').style.display='block';
  document.getElementById('footerBar').style.display='none';
  showScreen('screen-day');
}

async function chooseDay(d){
  state.day = d;
  state.tasks = SCHEDULE[state.worker][d].map(([time,task])=>({time,task,done:false}));
  document.getElementById('topSub').textContent = "రోజు "+d+" — పనులు పూర్తి చేయండి";
  renderTasks();
  document.getElementById('footerBar').style.display='flex';
  showScreen('screen-tasks');

  const dateStr = todayStr();
  const cacheKey = 'duty-'+state.worker+'-'+dateStr;
  let restored = null;
  try{
    const remote = await firebaseGet(dutyWorkerPath(dateStr, state.worker));
    setDutySyncStatus(true);
    if(remote && remote.day===d && Array.isArray(remote.tasks) && remote.tasks.length===state.tasks.length){
      restored = remote.tasks;
    }
  }catch(e){
    setDutySyncStatus(false);
  }
  if(!restored){
    const local = await localGet(cacheKey);
    if(local && local.day===d && Array.isArray(local.tasks) && local.tasks.length===state.tasks.length){
      restored = local.tasks;
    }
  }
  if(restored){
    state.tasks = restored;
    renderTasks();
  }
}

function goBack(){
  if(document.getElementById('screen-owner').classList.contains('active')){
    closeOwnerView();
  } else if(document.getElementById('screen-tasks').classList.contains('active')){
    document.getElementById('footerBar').style.display='none';
    document.getElementById('topSub').textContent="రోజు ఎంచుకోండి";
    showScreen('screen-day');
  } else if(document.getElementById('screen-day').classList.contains('active')){
    document.getElementById('backBtn').style.display='none';
    document.getElementById('topTitle').textContent="🧹 హోటల్ డ్యూటీ ట్రాకర్";
    document.getElementById('topSub').textContent="మీ పేరు ఎంచుకోండి";
    showScreen('screen-worker');
  }
}

function renderTasks(){
  const c = document.getElementById('taskContainer');
  c.innerHTML = "";
  const groups = {};
  state.tasks.forEach((t,i)=>{
    const s = shiftOf(t.time);
    groups[s] = groups[s]||[];
    groups[s].push(i);
  });
  ["morning","afternoon","evening","night"].forEach(s=>{
    if(!groups[s]) return;
    const block = document.createElement('div');
    block.className = "shift-block";
    block.innerHTML = `<div class="shift-title ${s}">${SHIFT_LABEL[s]}</div>`;
    const list = document.createElement('div');
    list.className = "task-list";
    groups[s].forEach(i=>{
      const t = state.tasks[i];
      const row = document.createElement('div');
      row.className = "task-row"+(t.done?" done":"");
      row.innerHTML = `
        <div class="task-emoji">${iconFor(t.task)}</div>
        <div class="task-text">
          <div class="task-name">${t.task}</div>
          <div class="task-time">${t.time}</div>
        </div>
        <div class="check">${t.done?"✓":""}</div>`;
      row.onclick = ()=>{ t.done = !t.done; renderTasks(); saveDutyProgress(); };
      list.appendChild(row);
    });
    block.appendChild(list);
    c.appendChild(block);
  });
  const done = state.tasks.filter(t=>t.done).length;
  const total = state.tasks.length;
  document.getElementById('progressFill').style.width = (total?done/total*100:0)+"%";
  document.getElementById('progressText').textContent = done+"/"+total;
}

function resetAll(){
  state.tasks.forEach(t=>t.done=false);
  renderTasks();
  saveDutyProgress();
}

// ---- owner view: live status of all 4 workers ----
let ownerPollTimer = null;

function openOwnerView(){
  document.getElementById('backBtn').style.display = 'block';
  document.getElementById('footerBar').style.display = 'none';
  document.getElementById('topTitle').textContent = '👁️ ఈరోజు స్టేటస్ (Today)';
  document.getElementById('topSub').textContent = 'అన్ని సిబ్బంది పురోగతి';
  showScreen('screen-owner');
  renderOwnerView();
  if(ownerPollTimer) clearInterval(ownerPollTimer);
  ownerPollTimer = setInterval(renderOwnerView, 5000);
}
function closeOwnerView(){
  if(ownerPollTimer){ clearInterval(ownerPollTimer); ownerPollTimer = null; }
  document.getElementById('backBtn').style.display = 'none';
  document.getElementById('topTitle').textContent = '🧹 హోటల్ డ్యూటీ ట్రాకర్';
  document.getElementById('topSub').textContent = 'మీ పేరు ఎంచుకోండి';
  showScreen('screen-worker');
}
function timeAgo(ts){
  if(!ts) return '\u2013';
  const secs = Math.floor((Date.now()-ts)/1000);
  if(secs<5) return 'ఇప్పుడే';
  if(secs<60) return secs+' సె క్రితం';
  const mins = Math.floor(secs/60);
  if(mins<60) return mins+' ని క్రితం';
  const hrs = Math.floor(mins/60);
  return hrs+' గం క్రితం';
}
async function renderOwnerView(){
  const dateStr = todayStr();
  const list = document.getElementById('ownerList');
  let data = null;
  try{
    data = await firebaseGet(dutyDatePath(dateStr));
    setDutySyncStatus(true);
  }catch(e){
    setDutySyncStatus(false);
  }
  list.innerHTML = WORKERS.map(w=>{
    const rec = data && data[w];
    if(!rec || !Array.isArray(rec.tasks)){
      return `<div class="progress-wrap" style="flex-direction:column;align-items:stretch;">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div style="font-weight:700;color:var(--navy);">${WORKER_EMOJI[w]||''} ${w}</div>
          <div style="font-size:.8rem;color:#999;">ఇంకా మొదలుపెట్టలేదు</div>
        </div>
      </div>`;
    }
    const done = rec.tasks.filter(t=>t.done).length;
    const total = rec.tasks.length;
    const pct = total ? Math.round(done/total*100) : 0;
    return `<div class="progress-wrap" style="flex-direction:column;align-items:stretch;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <div style="font-weight:700;color:var(--navy);">${WORKER_EMOJI[w]||''} ${w} <span style="font-weight:400;font-size:.8rem;color:#777;">\u00b7 రోజు ${rec.day}</span></div>
        <div style="font-weight:700;color:var(--navy);">${done}/${total}</div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;"></div></div>
      <div style="font-size:.72rem;color:#999;margin-top:4px;">చివరిసారి నవీకరణ: ${timeAgo(rec.updatedAt)}</div>
    </div>`;
  }).join('');
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(()=>t.style.display='none', 4000);
}

function openSettings(){
  document.getElementById('settingsModal').classList.add('active');
  window.storage?.get('owner-phone').then(r=>{
    if(r) document.getElementById('ownerPhone').value = r.value;
  }).catch(()=>{});
}
function closeSettings(){ document.getElementById('settingsModal').classList.remove('active'); }
async function saveSettings(){
  const v = document.getElementById('ownerPhone').value.trim();
  try{ await window.storage.set('owner-phone', v); }catch(e){}
  closeSettings();
  showToast("సేవ్ అయింది ✅");
}

async function getOwnerPhone(){
  try{
    const r = await window.storage.get('owner-phone');
    return r ? r.value : "";
  }catch(e){ return ""; }
}

async function sendReport(){
  const done = state.tasks.filter(t=>t.done).length;
  const total = state.tasks.length;
  const today = new Date().toLocaleDateString('en-GB');

  showToast("PDF తయారు చేస్తోంది... ⏳");

  // Capture the REAL, currently-visible checklist screen instead of a hidden
  // off-screen clone. This is what fixed the blank-PDF issue: hidden/off-screen
  // elements were rendering blank in html2canvas on iOS. The visible screen is
  // guaranteed to render correctly since the worker is looking right at it.
  const screenEl = document.getElementById('screen-tasks');

  const header = document.createElement('div');
  header.id = 'reportHeaderTemp';
  header.style.cssText = 'background:#12213f;color:#fff;padding:14px;border-radius:10px;margin-bottom:14px;text-align:center;font-family:inherit;';
  header.innerHTML = `
    <div style="font-weight:700;font-size:1.05rem;">🧹 OneStop DriveIn — డ్యూటీ రిపోర్ట్</div>
    <div style="font-size:.85rem;margin-top:6px;">${state.worker} • రోజు ${state.day} • ${today} • పూర్తయినవి: ${done}/${total}</div>
  `;
  screenEl.insertBefore(header, screenEl.firstChild);

  const opt = {
    margin:0.3,
    filename:`Duty_${state.worker}_Day${state.day}_${today.replace(/\//g,'-')}.pdf`,
    image:{type:'jpeg',quality:0.98},
    html2canvas:{
      scale:2,
      backgroundColor:'#ffffff',
      useCORS:true
    },
    jsPDF:{unit:'in',format:'a4',orientation:'portrait'}
  };

  // brief delay so the browser finishes laying out the header we just inserted
  await new Promise(r=>setTimeout(r,50));

  try{
    const pdfBlob = await html2pdf().set(opt).from(screenEl).outputPdf('blob');
    if(!pdfBlob || pdfBlob.size < 2000){
      throw new Error('PDF generated but looks empty/blank (size: '+(pdfBlob?pdfBlob.size:0)+' bytes)');
    }
    const fileName = opt.filename;
    const file = new File([pdfBlob], fileName, {type:'application/pdf'});

    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({
        files:[file],
        title:'డ్యూటీ రిపోర్ట్',
        text:`${state.worker} - రోజు ${state.day} డ్యూటీ రిపోర్ట్ (${done}/${total} పూర్తి)`
      });
      showToast("షేర్ చేయబడింది ✅");
    } else {
      const url = URL.createObjectURL(pdfBlob);
      const a = document.createElement('a');
      a.href = url; a.download = fileName;
      document.body.appendChild(a); a.click(); a.remove();
      const phone = await getOwnerPhone();
      const msg = encodeURIComponent(`${state.worker} - రోజు ${state.day} డ్యూటీ రిపోర్ట్ (${done}/${total} పూర్తి). దయచేసి డౌన్‌లోడ్ అయిన PDFని అటాచ్ చేయండి.`);
      const wa = phone ? `https://wa.me/${phone}?text=${msg}` : `https://wa.me/?text=${msg}`;
      showToast("PDF డౌన్‌లోడ్ అయింది. WhatsApp తెరుస్తోంది — PDFని అటాచ్ చేయండి 📎");
      setTimeout(()=>window.open(wa,'_blank'), 1200);
    }
  }catch(err){
    showToast("లోపం: మళ్ళీ ప్రయత్నించండి");
    console.error(err);
  }finally{
    const h = document.getElementById('reportHeaderTemp');
    if(h) h.remove();
  }
}
</script>
